[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "tbd-agents"
version = "0.1.0"
description = "Python SDK for TBD Agents"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "TBD Agents SDK Authors" }
]
dependencies = [
  "eval-type-backport>=0.2,<0.3",
  "httpx>=0.27,<1",
  "pydantic>=2.7,<3",
]
keywords = ["tbd-agents", "agents", "sdk", "api"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/naaico-tech/tbd-agents-sdk/tree/main/packages/python"
Repository = "https://github.com/naaico-tech/tbd-agents-sdk"
Releases = "https://github.com/naaico-tech/tbd-agents-sdk/releases"
Issues = "https://github.com/naaico-tech/tbd-agents-sdk/issues"

[project.optional-dependencies]
test = [
  "pytest>=8.3,<9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tbd_agents"]

[tool.pytest.ini_options]
testpaths = ["tests"]
